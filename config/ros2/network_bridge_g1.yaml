# G1 side: TCP server — subscribes ROS2 topics, sends over TCP to Leo
/**/*:
  ros__parameters:
    network_interface: "network_bridge::TcpInterface"

    TcpInterface:
      role: "server"
      port: 5000

    default_rate: 30.0
    default_zstd_level: 3
    publish_stale_data: False

    subscribe_namespace: ""
    publish_namespace: ""

    topics:
      - "/tf"
      - "/tf_static"
      - "/map"
      - "/map_2d"
      - "/scan"
      - "/localization_3d"
      - "/localization_3d_confidence"
      - "/Odometry_loc"
      - "/Laser_map_1"
      - "/cloud_registered_body_1"
      - "/cloud_registered_1"

    /tf:
      is_tf: True
      is_static_tf: False
      rate: 15.0

    /tf_static:
      is_static_tf: True
      rate: 1.0
